<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tappunk</title>
    <style>
        body {
            background-color: #000;
            color: #ffb000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            letter-spacing: 0.2rem;
            text-transform: lowercase;
        }
        nav a {
            color: #ffb000;
            text-decoration: none;
            margin: 5px 10px;
            border: 1px solid #ffb000;
            padding: 8px 16px;
            transition: all 0.3s ease;
            display: inline-block;
        }
        nav a:hover {
            background-color: #ffb000;
            color: #000;
        }
    </style>
</head>
<body>
    <h1>tappunk</h1>
    <nav>
        <a href="https://github.com/tappunk/muthr">muthr</a>
        <a href="https://github.com/tappunk/dotfiles">dotfiles</a>
        <a href="https://github.com/tappunk">github</a>
        <a href="https://x.com/tappunk">x</a>
    </nav>
</body>
</html>
